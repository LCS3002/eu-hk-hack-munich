<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace">
  <rect x="0.5" y="0.5" width="719" height="199" rx="14" fill="#fbfbfb" stroke="#e6e6e9"/>
  <defs>
    <marker id="m" markerWidth="10" markerHeight="10" refX="5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#9a9a9a"/>
    </marker>
  </defs>

  <!-- Buyer -->
  <rect x="22" y="52" width="184" height="84" rx="9" fill="#ffffff" stroke="#d9d9de"/>
  <rect x="22" y="52" width="5" height="84" rx="2.5" fill="#c1121f"/>
  <text x="40" y="78" font-size="10" font-weight="700" fill="#c1121f">BUYER · WALLET</text>
  <text x="40" y="101" font-size="13" font-weight="700" fill="#1a1a1a">0xd2c3…8cb0</text>
  <text x="40" y="120" font-size="10" fill="#6b7280">importer · funds the escrow</text>

  <!-- arrow Buyer -> Escrow -->
  <line x1="206" y1="94" x2="262" y2="94" stroke="#9a9a9a" stroke-width="1.5" marker-end="url(#m)"/>
  <text x="234" y="84" text-anchor="middle" font-size="9.5" font-weight="700" fill="#15803d">deposit</text>
  <text x="234" y="112" text-anchor="middle" font-size="9.5" fill="#6b7280">$46,000</text>

  <!-- Escrow (smart contract) -->
  <rect x="268" y="52" width="184" height="84" rx="9" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="268" y="52" width="5" height="84" rx="2.5" fill="#1a1a1a"/>
  <text x="286" y="78" font-size="10" font-weight="700" fill="#1a1a1a">TRADEESCROW</text>
  <text x="286" y="101" font-size="13" font-weight="700" fill="#1a1a1a">0x9527…540E</text>
  <text x="286" y="120" font-size="10" fill="#6b7280">smart contract · holds funds</text>

  <!-- arrow Escrow -> Supplier -->
  <line x1="452" y1="94" x2="508" y2="94" stroke="#9a9a9a" stroke-width="1.5" marker-end="url(#m)"/>
  <text x="480" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#15803d">release</text>
  <text x="480" y="112" text-anchor="middle" font-size="8.5" fill="#6b7280">rules-cleared</text>

  <!-- Supplier (paid) -->
  <rect x="514" y="52" width="184" height="84" rx="9" fill="#f0f7f2" stroke="#15803d" stroke-width="1.5"/>
  <rect x="514" y="52" width="5" height="84" rx="2.5" fill="#15803d"/>
  <text x="532" y="78" font-size="10" font-weight="700" fill="#15803d">SUPPLIER · PAID ✓</text>
  <text x="532" y="101" font-size="13" font-weight="700" fill="#1a1a1a">0x7099…79C8</text>
  <text x="532" y="120" font-size="10" fill="#6b7280">exporter · receives USDC</text>

  <!-- block note -->
  <text x="360" y="172" text-anchor="middle" font-size="10.5" fill="#6b7280">on <tspan fill="#c1121f" font-weight="700">BLOCK</tspan> → reject() — funds held in escrow, supplier unpaid</text>
</svg>
