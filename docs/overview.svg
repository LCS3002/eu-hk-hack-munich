<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 300" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace">
  <rect x="0.5" y="0.5" width="1179" height="299" rx="16" fill="#fbfbfb" stroke="#e6e6e9"/>
  <defs>
    <marker id="ar" markerWidth="11" markerHeight="11" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c1121f"/>
    </marker>
  </defs>

  <!-- THE PROBLEM -->
  <rect x="22" y="54" width="226" height="200" rx="11" fill="#fff" stroke="#e2c9cc"/>
  <rect x="22" y="54" width="6" height="200" rx="3" fill="#c1121f"/>
  <text x="44" y="88" font-size="12.5" font-weight="700" fill="#c1121f">THE PROBLEM</text>
  <text x="44" y="120" font-size="10" fill="#6b7280">Cross-border trade clears</text>
  <text x="44" y="135" font-size="10" fill="#6b7280">through Hong Kong — and</text>
  <text x="44" y="150" font-size="10" fill="#6b7280">leaks money three ways:</text>
  <text x="44" y="182" font-size="10" fill="#1a1a1a">· settles in 3–5 days</text>
  <text x="44" y="202" font-size="10" fill="#1a1a1a">· the books never reconcile</text>
  <text x="44" y="222" font-size="10" fill="#1a1a1a">· no one checks the trade</text>

  <line x1="252" y1="154" x2="286" y2="154" stroke="#c1121f" stroke-width="2" marker-end="url(#ar)"/>

  <!-- 1 · VERIFY THE TRADE -->
  <rect x="294" y="54" width="184" height="200" rx="11" fill="#fff" stroke="#d9d9de"/>
  <circle cx="316" cy="86" r="13" fill="#c1121f"/>
  <text x="316" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1</text>
  <text x="338" y="90" font-size="12" font-weight="700" fill="#1a1a1a">Verify the trade</text>
  <text x="312" y="128" font-size="10" fill="#6b7280">Does the invoice match</text>
  <text x="312" y="144" font-size="10" fill="#6b7280">the real shipment? Catch</text>
  <text x="312" y="160" font-size="10" fill="#6b7280">over-invoicing &amp; fraud —</text>
  <text x="312" y="176" font-size="10" fill="#6b7280">before any money moves.</text>

  <line x1="482" y1="154" x2="510" y2="154" stroke="#c1121f" stroke-width="2" marker-end="url(#ar)"/>

  <!-- 2 · GATE THE MONEY -->
  <rect x="518" y="54" width="184" height="200" rx="11" fill="#fff" stroke="#d9d9de"/>
  <circle cx="540" cy="86" r="13" fill="#c1121f"/>
  <text x="540" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">2</text>
  <text x="562" y="90" font-size="12" font-weight="700" fill="#1a1a1a">Gate the money</text>
  <text x="536" y="128" font-size="10" fill="#6b7280">The funds wait in escrow.</text>
  <text x="536" y="144" font-size="10" fill="#6b7280">They're released only if</text>
  <text x="536" y="160" font-size="10" fill="#6b7280">the trade checks out —</text>
  <text x="536" y="176" font-size="10" fill="#6b7280">and refused if it doesn't.</text>

  <line x1="706" y1="154" x2="734" y2="154" stroke="#c1121f" stroke-width="2" marker-end="url(#ar)"/>

  <!-- 3 · SETTLE IN SECONDS -->
  <rect x="742" y="54" width="184" height="200" rx="11" fill="#fff" stroke="#d9d9de"/>
  <circle cx="764" cy="86" r="13" fill="#c1121f"/>
  <text x="764" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">3</text>
  <text x="786" y="90" font-size="12" font-weight="700" fill="#1a1a1a">Settle in seconds</text>
  <text x="760" y="128" font-size="10" fill="#6b7280">Clear instantly on a</text>
  <text x="760" y="144" font-size="10" fill="#6b7280">stablecoin rail, into one</text>
  <text x="760" y="160" font-size="10" fill="#6b7280">shared record everyone</text>
  <text x="760" y="176" font-size="10" fill="#6b7280">reads — nothing to match.</text>

  <line x1="930" y1="154" x2="958" y2="154" stroke="#15803d" stroke-width="2" marker-end="url(#ar)"/>

  <!-- THE RESULT -->
  <rect x="966" y="54" width="192" height="200" rx="11" fill="#f0f7f2" stroke="#15803d"/>
  <rect x="966" y="54" width="6" height="200" rx="3" fill="#15803d"/>
  <text x="988" y="88" font-size="12.5" font-weight="700" fill="#15803d">THE RESULT</text>
  <text x="988" y="122" font-size="10" fill="#15803d" font-weight="700">✓ good trade settles fast</text>
  <text x="988" y="138" font-size="10" fill="#6b7280">capital freed, T+3 → T+0</text>
  <text x="988" y="170" font-size="10" fill="#c1121f" font-weight="700">✕ bad trade is refused</text>
  <text x="988" y="186" font-size="10" fill="#6b7280">funds held, never leave</text>
  <text x="988" y="222" font-size="10" fill="#1a1a1a">all verifiable on-chain</text>
</svg>
