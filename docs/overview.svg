<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 430" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect x="0.5" y="0.5" width="1239" height="429" rx="16" fill="#fbfbfb" stroke="#e6e6e9"/>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#c1121f"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#15803d"/></marker>
  </defs>

  <!-- ── FaanSail bracket over the 3 steps ── -->
  <text x="621" y="33" text-anchor="middle" font-size="14" font-weight="700" letter-spacing="0.16em" fill="#1a1a1a">F A A N S A I L</text>
  <text x="621" y="51" text-anchor="middle" font-size="10.5" letter-spacing="0.04em" fill="#9a9a9a">proof-of-trade-gated settlement</text>
  <path d="M318,72 L318,62 L924,62 L924,72" fill="none" stroke="#cfcfd6" stroke-width="1.3"/>

  <!-- ════ THE PROBLEM ════ -->
  <rect x="24" y="78" width="258" height="324" rx="12" fill="#ffffff" stroke="#e2c9cc"/>
  <rect x="24" y="78" width="6" height="324" rx="3" fill="#c1121f"/>
  <text x="48" y="116" font-size="15" font-weight="700" fill="#c1121f">THE PROBLEM</text>
  <text x="48" y="148" font-size="12.5" fill="#6b7280">Cross-border trade clears</text>
  <text x="48" y="166" font-size="12.5" fill="#6b7280">through Hong Kong — and it</text>
  <text x="48" y="184" font-size="12.5" fill="#6b7280">leaks money three ways:</text>

  <rect x="48" y="208" width="5" height="5" rx="1" fill="#c1121f"/>
  <text x="64" y="217" font-size="13.5" fill="#1a1a1a"><tspan font-weight="700" fill="#c1121f">Slow</tspan> — settles in 3–5 days</text>
  <text x="64" y="234" font-size="11" fill="#9a9a9a">capital sits trapped</text>

  <rect x="48" y="262" width="5" height="5" rx="1" fill="#c1121f"/>
  <text x="64" y="271" font-size="13.5" fill="#1a1a1a"><tspan font-weight="700" fill="#c1121f">Broken</tspan> — books never match</text>
  <text x="64" y="288" font-size="11" fill="#9a9a9a">manual reconciliation, fragile</text>

  <rect x="48" y="316" width="5" height="5" rx="1" fill="#c1121f"/>
  <text x="64" y="325" font-size="13.5" fill="#1a1a1a"><tspan font-weight="700" fill="#c1121f">Blind</tspan> — the trade unchecked</text>
  <text x="64" y="342" font-size="11" fill="#9a9a9a">over-invoicing slips through</text>

  <line x1="288" y1="240" x2="312" y2="240" stroke="#c1121f" stroke-width="2" marker-end="url(#ar)"/>

  <!-- ════ 1 · VERIFY THE TRADE ════ -->
  <rect x="318" y="78" width="190" height="324" rx="12" fill="#ffffff" stroke="#d9d9de"/>
  <circle cx="348" cy="116" r="15" fill="#c1121f"/>
  <text x="348" y="121" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">1</text>
  <circle cx="472" cy="112" r="7" fill="none" stroke="#c1121f" stroke-width="2"/>
  <line x1="477" y1="117" x2="482" y2="122" stroke="#c1121f" stroke-width="2.2" stroke-linecap="round"/>
  <text x="342" y="166" font-size="15" font-weight="700" fill="#1a1a1a">Verify the trade</text>
  <text x="342" y="198" font-size="11.5" fill="#6b7280">Does the invoice match</text>
  <text x="342" y="216" font-size="11.5" fill="#6b7280">the real shipment? We</text>
  <text x="342" y="234" font-size="11.5" fill="#6b7280">catch over-invoicing</text>
  <text x="342" y="252" font-size="11.5" fill="#6b7280">before any payout.</text>
  <line x1="342" y1="356" x2="484" y2="356" stroke="#eee" stroke-width="1"/>
  <text x="342" y="378" font-size="10" font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#9a9a9a">invoice ↔ bill of lading</text>

  <line x1="510" y1="240" x2="524" y2="240" stroke="#c1121f" stroke-width="2" marker-end="url(#ar)"/>

  <!-- ════ 2 · GATE THE MONEY ════ -->
  <rect x="526" y="78" width="190" height="324" rx="12" fill="#ffffff" stroke="#d9d9de"/>
  <circle cx="556" cy="116" r="15" fill="#c1121f"/>
  <text x="556" y="121" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">2</text>
  <rect x="675" y="112" width="16" height="13" rx="2.5" fill="none" stroke="#c1121f" stroke-width="2"/>
  <path d="M678,112 v-3 a5,5 0 0 1 10,0 v3" fill="none" stroke="#c1121f" stroke-width="2"/>
  <circle cx="683" cy="118" r="1.6" fill="#c1121f"/>
  <text x="550" y="166" font-size="15" font-weight="700" fill="#1a1a1a">Gate the money</text>
  <text x="550" y="198" font-size="11.5" fill="#6b7280">Funds wait in escrow —</text>
  <text x="550" y="216" font-size="11.5" fill="#6b7280">released only if the</text>
  <text x="550" y="234" font-size="11.5" fill="#6b7280">trade checks out, and</text>
  <text x="550" y="252" font-size="11.5" fill="#6b7280">refused if it doesn't.</text>
  <line x1="550" y1="356" x2="692" y2="356" stroke="#eee" stroke-width="1"/>
  <text x="550" y="378" font-size="10" font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#9a9a9a">onlyOracle · escrow</text>

  <line x1="718" y1="240" x2="732" y2="240" stroke="#c1121f" stroke-width="2" marker-end="url(#ar)"/>

  <!-- ════ 3 · SETTLE IN SECONDS ════ -->
  <rect x="734" y="78" width="190" height="324" rx="12" fill="#ffffff" stroke="#d9d9de"/>
  <circle cx="764" cy="116" r="15" fill="#c1121f"/>
  <text x="764" y="121" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">3</text>
  <path d="M892,100 L884,113 L890,113 L887,124 L897,110 L891,110 Z" fill="#c1121f"/>
  <text x="758" y="166" font-size="15" font-weight="700" fill="#1a1a1a">Settle in seconds</text>
  <text x="758" y="198" font-size="11.5" fill="#6b7280">Clear instantly on a</text>
  <text x="758" y="216" font-size="11.5" fill="#6b7280">stablecoin rail into</text>
  <text x="758" y="234" font-size="11.5" fill="#6b7280">one shared record all</text>
  <text x="758" y="252" font-size="11.5" fill="#6b7280">parties read.</text>
  <line x1="758" y1="356" x2="900" y2="356" stroke="#eee" stroke-width="1"/>
  <text x="758" y="378" font-size="10" font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#9a9a9a">one Settled event</text>

  <line x1="930" y1="240" x2="954" y2="240" stroke="#15803d" stroke-width="2" marker-end="url(#ag)"/>

  <!-- ════ THE RESULT ════ -->
  <rect x="960" y="78" width="256" height="324" rx="12" fill="#f0f7f2" stroke="#15803d"/>
  <rect x="960" y="78" width="6" height="324" rx="3" fill="#15803d"/>
  <text x="984" y="116" font-size="15" font-weight="700" fill="#15803d">THE RESULT</text>

  <text x="984" y="154" font-size="13.5" font-weight="700" fill="#15803d">✓ Good trade settles fast</text>
  <text x="984" y="172" font-size="11.5" fill="#6b7280">capital freed · T+3 → T+0</text>

  <text x="984" y="214" font-size="13.5" font-weight="700" fill="#c1121f">✕ Bad trade is refused</text>
  <text x="984" y="232" font-size="11.5" fill="#6b7280">funds held, never leave</text>

  <line x1="984" y1="262" x2="1196" y2="262" stroke="#cfe3d6" stroke-width="1"/>
  <text x="984" y="292" font-size="13" font-weight="700" fill="#1a1a1a">Verifiable on-chain</text>
  <text x="984" y="312" font-size="11" fill="#6b7280">buyer · supplier · regulator</text>
  <text x="984" y="330" font-size="11" fill="#6b7280">read one shared event</text>
</svg>
